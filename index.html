<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Manager</title>
<style>
:root {
  --sidebar-bg: #0f172a;
  --sidebar-active: #1d4ed8;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --bg: #f1f5f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-size: 14px; }

/* ── Sidebar ── */
.sidebar { width: 216px; background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-logo { padding: 18px 16px 14px; font-size: 13px; font-weight: 700; color: #fff; border-bottom: 1px solid #1e293b; letter-spacing: 0.3px; }
.sidebar-logo em { color: #60a5fa; font-style: normal; }
.sidebar-nav { padding: 10px 8px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: #94a3b8; font-size: 13px; margin-bottom: 1px; user-select: none; }
.nav-item:hover { background: #1e293b; color: #fff; }
.nav-item.active { background: var(--sidebar-active); color: #fff; }
.nav-icon { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.9; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 22px; flex-shrink: 0; }
.topbar-title { font-size: 14px; font-weight: 600; }
.content { flex: 1; overflow-y: auto; padding: 22px; }

/* ── Cards ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 9px 12px; background: #f8fafc; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tbody tr:hover td { background: #fafbfc; }
tbody tr:last-child td { border-bottom: none; }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.b-new          { background: #dbeafe; color: #1e40af; }
.b-connected    { background: #dcfce7; color: #166534; }
.b-disqualified { background: #fee2e2; color: #991b1b; }
.b-unsubscribed { background: #f3f4f6; color: #6b7280; }
.b-active       { background: #dcfce7; color: #166534; }
.b-inactive     { background: #f3f4f6; color: #6b7280; }
.b-default      { background: #f3f4f6; color: #374151; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 13px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid transparent; font-weight: 500; line-height: 1; transition: background 0.12s, color 0.12s; white-space: nowrap; }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-ghost { background: none; border-color: var(--border); color: var(--muted); }
.btn-ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }
.btn-danger { background: none; border-color: #fecaca; color: var(--danger); }
.btn-danger:hover:not(:disabled) { background: #fef2f2; }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }
.btn-sm { padding: 4px 9px; font-size: 12px; }

/* ── Forms ── */
.fg { margin-bottom: 16px; }
.fl { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
input[type=text], input[type=email], input[type=date], input[type=number], input[type=password], select, textarea {
  width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; color: var(--text); background: #fff; outline: none; font-family: inherit; line-height: 1.4;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Filters ── */
.filters { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.filters select, .filters input[type=text] { width: auto; min-width: 140px; }
.filter-count { font-size: 12px; color: var(--muted); margin-left: auto; }

/* ── Section header ── */
.section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-hdr h2 { font-size: 14px; font-weight: 600; }

/* ── Campaign cards ── */
.camp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.camp-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.camp-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.camp-meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.seq-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
.seq-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.seq-pending { background: #f1f5f9; color: var(--muted); }
.seq-sent { background: #dcfce7; color: #166534; }
.camp-actions { display: flex; gap: 5px; margin-top: 12px; flex-wrap: wrap; }

/* ── Alert ── */
.alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; }
.alert-info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
.alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.alert-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.alert-warn    { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 26px; width: 580px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; padding: 0; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── Misc ── */
.loading { text-align: center; padding: 50px; color: var(--muted); font-size: 13px; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
.log-sent   { color: var(--success); font-weight: 500; }
.log-failed { color: var(--danger); }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 10px 0; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.config-wrap { max-width: 460px; margin: 60px auto; }
.tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); margin-right: 3px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">✉ <em>Campaign</em> Manager</div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="nav('dashboard')" id="nav-dashboard">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="nav('contacts')" id="nav-contacts">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Contacts
    </div>
    <div class="nav-item" onclick="nav('campaigns')" id="nav-campaigns">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      Campaigns
    </div>
    <div class="nav-item" onclick="nav('templates')" id="nav-templates">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Templates
    </div>
    <div class="nav-item" onclick="nav('log')" id="nav-log">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Send Log
    </div>
    <div class="nav-item" onclick="nav('settings')" id="nav-settings">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Settings
    </div>
  </nav>
</div>

<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <span id="topbar-actions"></span>
  </div>
  <div class="content" id="content">
    <div class="loading">Loading…</div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="onModalBg(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────
const CFG = {
  url:   localStorage.getItem('cm_url')   || '',
  token: localStorage.getItem('cm_token') || ''
};
function saveConfig(url, token) {
  CFG.url = url; CFG.token = token;
  localStorage.setItem('cm_url', url);
  localStorage.setItem('cm_token', token);
}

// ── API ──────────────────────────────────────────────────────
async function api(action, params = {}) {
  const u = new URL(CFG.url);
  u.searchParams.set('token', CFG.token);
  u.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => u.searchParams.set(k, String(v)));
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function apiPost(action, data = {}) {
  // Uses GET + JSON payload param to avoid CORS preflight failures with Apps Script
  const u = new URL(CFG.url);
  u.searchParams.set('token', CFG.token);
  u.searchParams.set('action', action);
  u.searchParams.set('payload', JSON.stringify(data));
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Navigation ───────────────────────────────────────────────
const PAGE_TITLES = { dashboard: 'Dashboard', contacts: 'Contacts', campaigns: 'Campaigns', templates: 'Email Templates', log: 'Send Log', settings: 'Settings' };

function nav(view) {
  if (!CFG.url) { renderSetup(); return; }
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + view);
  if (el) el.classList.add('active');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[view] || view;
  document.getElementById('topbar-actions').innerHTML = '';
  setContent('<div class="loading">Loading…</div>');
  closeModal();
  const fn = { dashboard: loadDashboard, contacts: loadContacts, campaigns: loadCampaigns, templates: loadTemplates, log: loadLog, settings: renderSettings }[view];
  if (fn) fn().catch(err => setContent(`<div class="alert alert-error">Error: ${esc(err.message)}<br><small>Check your connection in Settings.</small></div>`));
}

function setContent(html) { document.getElementById('content').innerHTML = html; }

// ── Setup screen ─────────────────────────────────────────────
function renderSetup() {
  setContent(`
    <div class="config-wrap">
      <div class="card">
        <h2 style="font-size:16px;margin-bottom:6px">Connect to Apps Script</h2>
        <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Paste the URL and secret token from your deployed Apps Script web app. See SETUP.md for instructions.</p>
        <div class="fg"><label class="fl">Apps Script Web App URL</label><input id="su-url" type="text" placeholder="https://script.google.com/macros/s/…/exec" value="${esc(CFG.url)}"></div>
        <div class="fg"><label class="fl">Secret Token</label><input id="su-token" type="text" placeholder="your-secret-token" value="${esc(CFG.token)}"></div>
        <button class="btn btn-primary" onclick="doConnect()">Connect & Open Dashboard</button>
      </div>
    </div>`);
}
async function doConnect() {
  const url = document.getElementById('su-url').value.trim();
  const token = document.getElementById('su-token').value.trim();
  if (!url || !token) { alert('Both fields are required.'); return; }
  saveConfig(url, token);
  nav('dashboard');
}

// ── Dashboard ────────────────────────────────────────────────
async function loadDashboard() {
  const d = await api('dashboard');
  if (d.error) throw new Error(d.error);

  const byStatus = d.byStatus || {};
  const byGroup  = d.byGroup  || {};

  const statusRows = Object.entries(byStatus).map(([s, n]) =>
    `<tr><td>${statusBadge(s)}</td><td style="text-align:right;font-weight:600;padding-right:0">${n}</td></tr>`
  ).join('') || '<tr><td colspan="2" style="color:var(--muted)">No data</td></tr>';

  const groupRows = Object.entries(byGroup).map(([g, n]) =>
    `<tr><td style="font-size:13px">${esc(g)}</td><td style="text-align:right;font-weight:600;padding-right:0">${n}</td></tr>`
  ).join('') || '<tr><td colspan="2" style="color:var(--muted)">No data</td></tr>';

  const logRows = (d.recentLog || []).slice(0, 15).map(l => {
    const replied = l['Reply Detected'] === true || l['Reply Detected'] === 'TRUE';
    return `<tr>
      <td style="color:var(--muted);white-space:nowrap;font-size:12px">${fmtDate(l.Timestamp)}</td>
      <td style="white-space:nowrap">${esc(l['Campaign Name'] || '')}</td>
      <td style="color:var(--muted)">${esc(l.Email || '')}</td>
      <td style="white-space:nowrap">Seq&nbsp;${l['Sequence #'] || ''}</td>
      <td class="${l.Status === 'Sent' ? 'log-sent' : l.Status === 'Failed' ? 'log-failed' : ''}">${esc(l.Status || '')}</td>
      <td style="text-align:center;color:var(--success)">${replied ? '✓' : ''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted)">No sends yet</td></tr>';

  setContent(`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Contacts</div><div class="stat-value">${d.totalContacts}</div></div>
      <div class="stat-card"><div class="stat-label">Emails Sent</div><div class="stat-value">${d.totalSent}</div></div>
      <div class="stat-card"><div class="stat-label">Replies</div><div class="stat-value">${d.totalReplied}</div></div>
      <div class="stat-card"><div class="stat-label">Active Campaigns</div><div class="stat-value">${d.activeCampaigns}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:160px 160px 1fr;gap:14px">
      <div class="card" style="padding:14px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">By Status</div>
        <table><tbody>${statusRows}</tbody></table>
      </div>
      <div class="card" style="padding:14px">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">By Group</div>
        <table><tbody>${groupRows}</tbody></table>
      </div>
      <div class="card" style="padding:0">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Recent Activity</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Time</th><th>Campaign</th><th>Email</th><th>Seq</th><th>Status</th><th>Reply</th></tr></thead>
            <tbody>${logRows}</tbody>
          </table>
        </div>
      </div>
    </div>`);
}

// ── Contacts ─────────────────────────────────────────────────
let _contacts = [];

async function loadContacts() {
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openContactModal({})">+ Add Contact</button>`;

  const d = await api('contacts');
  if (d.error) throw new Error(d.error);
  _contacts = d.contacts || [];

  const groups   = uniq(_contacts.map(c => c.Group).filter(Boolean)).sort();
  const statuses = uniq(_contacts.map(c => c.Status).filter(Boolean)).sort();

  setContent(`
    <div class="filters">
      <input type="text" id="cf-search" placeholder="Search name or email…" oninput="renderContacts()" style="min-width:200px">
      <select id="cf-group" onchange="renderContacts()">
        <option value="">All Groups</option>
        ${groups.map(g => `<option>${esc(g)}</option>`).join('')}
      </select>
      <select id="cf-status" onchange="renderContacts()">
        <option value="">All Statuses</option>
        ${statuses.map(s => `<option>${esc(s)}</option>`).join('')}
      </select>
      <span class="filter-count" id="cf-count"></span>
    </div>
    <div class="card" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Organization</th><th>Title</th><th>Group</th><th>Status</th><th style="text-align:center">Sent</th><th>Last Contacted</th><th></th></tr></thead>
          <tbody id="contacts-tbody"></tbody>
        </table>
      </div>
    </div>`);
  renderContacts();
}

function renderContacts() {
  const search = (document.getElementById('cf-search')?.value || '').toLowerCase();
  const group  = document.getElementById('cf-group')?.value  || '';
  const status = document.getElementById('cf-status')?.value || '';

  let list = _contacts;
  if (search) list = list.filter(c =>
    (c['First Name'] + ' ' + c['Last Name'] + ' ' + c.Email).toLowerCase().includes(search));
  if (group)  list = list.filter(c => c.Group  === group);
  if (status) list = list.filter(c => c.Status === status);

  document.getElementById('cf-count').textContent = list.length + ' contacts';
  document.getElementById('contacts-tbody').innerHTML = list.map((c, i) => `
    <tr>
      <td style="font-weight:500;white-space:nowrap">${esc((c['First Name'] || '') + ' ' + (c['Last Name'] || '')).trim() || '—'}</td>
      <td style="color:var(--muted);font-size:12px">${esc(c.Email || '')}</td>
      <td>${esc(c.Organization || '')}</td>
      <td style="color:var(--muted);font-size:12px">${esc(c.Title || '')}</td>
      <td><span class="tag">${esc(c.Group || '—')}</span></td>
      <td>${statusBadge(c.Status)}</td>
      <td style="text-align:center;color:var(--muted)">${c['Emails Sent'] || 0}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${fmtDate(c['Last Contacted'])}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openContactModal(_contacts.find(x=>x.Email==='${esc(c.Email)}'))">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteContact('${esc(c.Email)}')">Del</button>
      </td>
    </tr>`).join('') ||
    `<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No contacts match your filters</td></tr>`;
}

const DEFAULT_GROUPS = ['Investor', 'FBO', 'Regional Airlines', 'Major Airlines', 'Defense'];

function openContactModal(c) {
  if (!c) c = {};
  const isEdit   = !!c.Email;
  const groups   = uniq([...DEFAULT_GROUPS, ..._contacts.map(x => x.Group).filter(Boolean)]);
  const statuses = ['New', 'Connected', 'Disqualified', 'Unsubscribed'];

  showModal(`
    <div class="modal-hdr">
      <span class="modal-title">${isEdit ? 'Edit Contact' : 'Add Contact'}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="g2">
      <div class="fg"><label class="fl">First Name</label><input id="m-fn" value="${esc(c['First Name'] || '')}" placeholder="First name"></div>
      <div class="fg"><label class="fl">Last Name</label><input id="m-ln" value="${esc(c['Last Name'] || '')}" placeholder="Last name"></div>
    </div>
    <div class="fg"><label class="fl">Email *</label><input id="m-email" type="email" value="${esc(c.Email || '')}" placeholder="email@company.com"${isEdit ? ' readonly style="background:#f8fafc"' : ''}></div>
    <div class="g2">
      <div class="fg"><label class="fl">Organization</label><input id="m-org" value="${esc(c.Organization || '')}" placeholder="Company name"></div>
      <div class="fg"><label class="fl">Title</label><input id="m-title" value="${esc(c.Title || '')}" placeholder="e.g. CEO"></div>
    </div>
    <div class="g2">
      <div class="fg">
        <label class="fl">Group</label>
        <select id="m-group">
          ${groups.map(g => `<option${c.Group === g ? ' selected' : ''}>${esc(g)}</option>`).join('')}
          <option value="__custom">+ Custom…</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Status</label>
        <select id="m-status">
          ${statuses.map(s => `<option${c.Status === s ? ' selected' : ''}>${esc(s)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea id="m-notes" rows="3" placeholder="Any notes about this contact…">${esc(c.Notes || '')}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact(${isEdit})">Save Contact</button>
    </div>`;
}

async function saveContact(isEdit) {
  const email = document.getElementById('m-email').value.trim();
  if (!email) { alert('Email is required.'); return; }
  let group = document.getElementById('m-group').value;
  if (group === '__custom') { group = prompt('Enter group name:') || ''; if (!group) return; }

  const contact = {
    'First Name': document.getElementById('m-fn').value.trim(),
    'Last Name':  document.getElementById('m-ln').value.trim(),
    Email:        email,
    Organization: document.getElementById('m-org').value.trim(),
    Title:        document.getElementById('m-title').value.trim(),
    Group:        group,
    Status:       document.getElementById('m-status').value,
    Notes:        document.getElementById('m-notes').value.trim()
  };

  const r = await apiPost('saveContact', { contact });
  if (r.error) { alert('Error: ' + r.error); return; }
  closeModal();
  await loadContacts();
}

async function deleteContact(email) {
  if (!confirm('Delete contact: ' + email + '?')) return;
  const r = await apiPost('deleteContact', { email });
  if (r.error) { alert(r.error); return; }
  await loadContacts();
}

// ── Campaigns ────────────────────────────────────────────────
let _campaigns = [];

async function loadCampaigns() {
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openCampaignModal({})">+ New Campaign</button>`;

  const d = await api('campaigns');
  if (d.error) throw new Error(d.error);
  _campaigns = d.campaigns || [];

  if (!_campaigns.length) {
    setContent(`<div class="card empty-state"><p style="margin-bottom:14px">No campaigns yet. Create your first one!</p><button class="btn btn-primary" onclick="openCampaignModal({})">+ New Campaign</button></div>`);
    return;
  }

  const cards = _campaigns.map(c => {
    const active  = c.Active === true || c.Active === 'TRUE';
    const numSeq  = Number(c['Num Sequences']) || 3;
    const s1 = c['Seq1 Sent'], s2 = c['Seq2 Sent'], s3 = c['Seq3 Sent'];
    const canSend1 = !s1;
    const canSend2 = numSeq >= 2 && !!s1 && !s2;
    const canSend3 = numSeq >= 3 && !!s2 && !s3;

    const seqLabel = numSeq === 1 ? 'Single send' : numSeq === 2 ? '1 follow-up' : '2 follow-ups';
    const delayMeta = numSeq >= 2 ? ` · +${c['Day2 Delay'] || 7}d` : '';
    const delay2Meta = numSeq >= 3 ? ` · +${c['Day3 Delay'] || 7}d` : '';

    const seq2row = numSeq >= 2 ? `
        <div class="seq-row">
          <div class="seq-dot ${s2 ? 'seq-sent' : 'seq-pending'}">${s2 ? '✓' : '2'}</div>
          <span>${s2 ? 'Sent ' + fmtDate(s2) : 'Follow-up 1'}</span>
          ${canSend2 ? `<button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="manualSend('${c.ID}',2,'${esc(c.Name)}')">Send</button>` : ''}
        </div>` : '';
    const seq3row = numSeq >= 3 ? `
        <div class="seq-row">
          <div class="seq-dot ${s3 ? 'seq-sent' : 'seq-pending'}">${s3 ? '✓' : '3'}</div>
          <span>${s3 ? 'Sent ' + fmtDate(s3) : 'Follow-up 2'}</span>
          ${canSend3 ? `<button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="manualSend('${c.ID}',3,'${esc(c.Name)}')">Send</button>` : ''}
        </div>` : '';

    return `
    <div class="camp-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px">
        <div class="camp-name">${esc(c.Name)}</div>
        <span class="badge ${active ? 'b-active' : 'b-inactive'}">${active ? 'Active' : 'Inactive'}</span>
      </div>
      <div class="camp-meta">
        <strong>${esc(c.Group)}</strong> · ${esc(seqLabel)} · Target: <em>${esc(c['Target Status'] || 'New')}</em>
        ${c['Exclude Status'] ? ` · Exclude: ${esc(c['Exclude Status'])}` : ''}<br>
        Start: ${fmtDate(c['Start Date'])}${delayMeta}${delay2Meta}
      </div>
      <div>
        <div class="seq-row">
          <div class="seq-dot ${s1 ? 'seq-sent' : 'seq-pending'}">${s1 ? '✓' : '1'}</div>
          <span>${s1 ? 'Sent ' + fmtDate(s1) : 'Initial email'}</span>
          ${canSend1 ? `<button class="btn btn-sm btn-ghost" style="margin-left:auto" onclick="manualSend('${c.ID}',1,'${esc(c.Name)}')">Send</button>` : ''}
        </div>
        ${seq2row}${seq3row}
      </div>
      <div class="camp-actions">
        <button class="btn btn-ghost btn-sm" onclick="openCampaignModal(_campaigns.find(x=>x.ID==='${c.ID}'))">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="goToTemplates('${c.ID}')">Templates</button>
        <button class="btn btn-ghost btn-sm" onclick="goToLog('${c.ID}')">Log</button>
        <button class="btn btn-ghost btn-sm" style="color:${active?'var(--warning)':'var(--success)'}" onclick="toggleActive('${c.ID}',${active})">${active ? 'Deactivate' : 'Activate'}</button>
      </div>
    </div>`;
  }).join('');

  setContent(`<div class="camp-grid">${cards}</div>`);
}

function openCampaignModal(c) {
  if (!c) c = {};
  const isEdit = !!c.ID;
  const groups = uniq([...DEFAULT_GROUPS, ..._campaigns.map(x => x.Group).filter(Boolean)]);
  const today  = new Date().toISOString().split('T')[0];

  showModal(`
    <div class="modal-hdr">
      <span class="modal-title">${isEdit ? 'Edit Campaign' : 'New Campaign'}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="fg"><label class="fl">Campaign Name *</label><input id="cp-name" value="${esc(c.Name || '')}" placeholder="e.g. Q1 Investor Outreach"></div>
    <div class="g2">
      <div class="fg">
        <label class="fl">Target Group *</label>
        <select id="cp-group">
          ${groups.map(g => `<option${c.Group === g ? ' selected' : ''}>${esc(g)}</option>`).join('')}
        </select>
      </div>
      <div class="fg">
        <label class="fl">Number of Emails</label>
        <select id="cp-numseq" onchange="onNumSeqChange()">
          <option value="1"${(c['Num Sequences']||3)==1?' selected':''}>1 — Single send</option>
          <option value="2"${(c['Num Sequences']||3)==2?' selected':''}>2 — One follow-up</option>
          <option value="3"${(c['Num Sequences']||3)==3?' selected':''}>3 — Two follow-ups</option>
        </select>
      </div>
    </div>
    <div class="g2">
      <div class="fg">
        <label class="fl">Target Status</label>
        <input id="cp-tstatus" value="${esc(c['Target Status'] || 'New')}" placeholder="New">
        <div class="hint">Comma-separated. e.g. New</div>
      </div>
      <div class="fg">
        <label class="fl">Exclude Statuses</label>
        <input id="cp-exclude" value="${esc(c['Exclude Status'] || 'Disqualified,Unsubscribed')}">
        <div class="hint">Always skipped.</div>
      </div>
    </div>
    <div id="cp-delays">
      <div class="g3">
        <div class="fg"><label class="fl">Start Date</label><input id="cp-start" type="date" value="${fmtDateInput(c['Start Date']) || today}"></div>
        <div class="fg" id="cp-d2-wrap"><label class="fl">Follow-up 1 delay (days)</label><input id="cp-d2" type="number" min="1" value="${c['Day2 Delay'] || 7}"></div>
        <div class="fg" id="cp-d3-wrap"><label class="fl">Follow-up 2 delay (days)</label><input id="cp-d3" type="number" min="1" value="${c['Day3 Delay'] || 7}"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCampaign('${c.ID || ''}')">Save Campaign</button>
    </div>`);
  onNumSeqChange();
}

function onNumSeqChange() {
  const n = Number(document.getElementById('cp-numseq')?.value || 3);
  const d2 = document.getElementById('cp-d2-wrap');
  const d3 = document.getElementById('cp-d3-wrap');
  if (d2) d2.style.display = n >= 2 ? '' : 'none';
  if (d3) d3.style.display = n >= 3 ? '' : 'none';
}

async function saveCampaign(existingId) {
  const name = document.getElementById('cp-name').value.trim();
  if (!name) { alert('Campaign name is required.'); return; }
  const numSeq = Number(document.getElementById('cp-numseq').value) || 3;
  const campaign = {
    ID: existingId || '',
    Name: name,
    Group: document.getElementById('cp-group').value,
    'Num Sequences':  numSeq,
    'Target Status':  document.getElementById('cp-tstatus').value.trim() || 'New',
    'Exclude Status': document.getElementById('cp-exclude').value.trim(),
    'Start Date':     document.getElementById('cp-start').value,
    'Day2 Delay':     numSeq >= 2 ? (Number(document.getElementById('cp-d2').value) || 7) : '',
    'Day3 Delay':     numSeq >= 3 ? (Number(document.getElementById('cp-d3').value) || 7) : '',
    Active: true
  };
  const r = await apiPost('saveCampaign', { campaign });
  if (r.error) { alert('Error: ' + r.error); return; }
  closeModal();
  await loadCampaigns();
}

async function toggleActive(id, currentActive) {
  const r = await apiPost('saveCampaign', { campaign: { ID: id, Active: !currentActive } });
  if (r.error) { alert(r.error); return; }
  await loadCampaigns();
}

async function manualSend(campaignId, seqNum, name) {
  if (!confirm(`Send Sequence ${seqNum} for "${name}"?\n\nThis sends emails immediately to all eligible contacts. Make sure the template is saved first.`)) return;

  showModal(`
    <div class="modal-hdr"><span class="modal-title">Sending Sequence ${seqNum}…</span></div>
    <div style="padding:10px 0">
      <p style="color:var(--muted);font-size:13px;margin-bottom:12px">Sending via Brevo. This may take a minute or two for large lists…</p>
      <div class="progress-bar"><div class="progress-fill" id="send-prog" style="width:100%;animation:none;background:repeating-linear-gradient(90deg,var(--accent) 0,var(--accent) 40%,#bfdbfe 40%,#bfdbfe 50%) 0 0/200% 100%;animation:slide 1s linear infinite"></div></div>
    </div>
    <style>@keyframes slide{to{background-position:-200% 0}}</style>`);

  try {
    const r = await apiPost('sendSequence', { campaignId, sequenceNum: seqNum });
    closeModal();
    if (r.error) { showModal(`<div class="modal-hdr"><span class="modal-title">Error</span><button class="modal-close" onclick="closeModal()">×</button></div><div class="alert alert-error">${esc(r.error)}</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`); return; }
    showModal(`
      <div class="modal-hdr"><span class="modal-title">Send Complete</span><button class="modal-close" onclick="closeModal();loadCampaigns()">×</button></div>
      <div class="alert alert-success" style="margin-bottom:${r.errors?.length ? '12px' : '0'}">
        ✓ <strong>${r.sent}</strong> sent &nbsp;·&nbsp; <strong>${r.failed}</strong> failed
        ${r.message ? `<br><small>${esc(r.message)}</small>` : ''}
      </div>
      ${r.errors?.length ? `<div style="font-size:12px;color:var(--danger);margin-bottom:12px">${r.errors.map(esc).join('<br>')}</div>` : ''}
      <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal();loadCampaigns()">Done</button></div>`);
  } catch(err) {
    closeModal();
    alert('Error: ' + err.message);
  }
}

function goToTemplates(campaignId) {
  _selectedCampaignId = campaignId;
  nav('templates');
}
function goToLog(campaignId) {
  _logCampaignFilter = campaignId;
  nav('log');
}

// ── Templates ────────────────────────────────────────────────
let _selectedCampaignId = '';

async function loadTemplates() {
  const d = await api('campaigns');
  if (d.error) throw new Error(d.error);
  const campaigns = d.campaigns || [];

  if (!campaigns.length) {
    setContent(`<div class="card empty-state">Create a campaign first, then write templates here.</div>`);
    return;
  }

  setContent(`
    <div class="filters" style="margin-bottom:18px">
      <label class="fl" style="margin:0;white-space:nowrap">Campaign:</label>
      <select id="tmpl-camp" onchange="loadTemplateEditor(this.value)" style="min-width:220px">
        <option value="">— Select a campaign —</option>
        ${campaigns.map(c => `<option value="${c.ID}"${c.ID === _selectedCampaignId ? ' selected' : ''}>${esc(c.Name)}</option>`).join('')}
      </select>
    </div>
    <div id="tmpl-body"></div>`);

  if (_selectedCampaignId) loadTemplateEditor(_selectedCampaignId);
}

async function loadTemplateEditor(campaignId) {
  _selectedCampaignId = campaignId;
  if (!campaignId) { document.getElementById('tmpl-body').innerHTML = ''; return; }

  const [td, cd] = await Promise.all([api('templates', { campaignId }), api('campaigns')]);
  const templates = td.templates || [];
  const campaign  = (cd.campaigns || []).find(c => c.ID === campaignId) || {};
  const numSeq    = Number(campaign['Num Sequences']) || 3;

  const seqLabels = ['Initial Email', 'Follow-up 1', 'Follow-up 2'];

  const html = [1, 2, 3].filter(seq => seq <= numSeq).map(seq => {
    const t = templates.find(x => Number(x.Sequence) === seq) || {};
    return `
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-weight:600;font-size:14px">Sequence ${seq} — ${seqLabels[seq-1]}</span>
        <span style="font-size:11px;color:var(--muted)">
          {{first_name}} · {{last_name}} · {{name}} · {{organization}} · {{title}} · {{email}}
        </span>
      </div>
      <div class="fg"><label class="fl">Subject</label><input id="ts-${seq}" value="${esc(t.Subject || '')}" placeholder="Subject line…"></div>
      <div class="fg"><label class="fl">Body</label><textarea id="tb-${seq}" rows="10" placeholder="Hi {{first_name}},&#10;&#10;">${esc(t.Body || '')}</textarea></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary btn-sm" onclick="saveTemplate(${seq},'${campaignId}')">Save</button>
        ${t.Subject ? `<button class="btn btn-ghost btn-sm" onclick="previewTemplate(${seq})">Preview</button>` : ''}
        <span id="save-msg-${seq}" style="font-size:12px;color:var(--success)"></span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('tmpl-body').innerHTML = html;
}

async function saveTemplate(seq, campaignId) {
  const subject = document.getElementById(`ts-${seq}`).value.trim();
  const body    = document.getElementById(`tb-${seq}`).value.trim();
  if (!subject || !body) { alert('Subject and body are required.'); return; }

  const r = await apiPost('saveTemplate', { template: { 'Campaign ID': campaignId, Sequence: seq, Subject: subject, Body: body } });
  if (r.error) { alert('Error: ' + r.error); return; }

  const msg = document.getElementById(`save-msg-${seq}`);
  msg.textContent = '✓ Saved';
  setTimeout(() => { msg.textContent = ''; }, 2500);
}

function previewTemplate(seq) {
  const subject = document.getElementById(`ts-${seq}`).value;
  const body    = document.getElementById(`tb-${seq}`).value;
  const sample  = { '{{first_name}}': 'Jane', '{{last_name}}': 'Smith', '{{name}}': 'Jane Smith', '{{organization}}': 'Acme Aviation', '{{title}}': 'VP Operations', '{{email}}': 'jane@acme.com' };
  let ps = subject, pb = body;
  Object.entries(sample).forEach(([k, v]) => {
    const re = new RegExp(k.replace(/[{}]/g, '\\$&'), 'gi');
    ps = ps.replace(re, v); pb = pb.replace(re, v);
  });
  showModal(`
    <div class="modal-hdr"><span class="modal-title">Preview — Sequence ${seq}</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="background:var(--bg);border-radius:6px;padding:12px 14px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Subject</div>
      <div style="font-weight:500">${esc(ps)}</div>
    </div>
    <div style="background:var(--bg);border-radius:6px;padding:12px 14px;white-space:pre-wrap;font-size:13px;line-height:1.6;max-height:320px;overflow-y:auto">${esc(pb)}</div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`);
}

// ── Send Log ─────────────────────────────────────────────────
let _log = [], _logCampaigns = [], _logCampaignFilter = '';

async function loadLog() {
  const [ld, cd] = await Promise.all([api('log'), api('campaigns')]);
  if (ld.error) throw new Error(ld.error);
  _log = ld.log || [];
  _logCampaigns = cd.campaigns || [];

  setContent(`
    <div class="filters">
      <select id="lf-camp" onchange="renderLog()" style="min-width:180px">
        <option value="">All Campaigns</option>
        ${_logCampaigns.map(c => `<option value="${c.ID}"${c.ID === _logCampaignFilter ? ' selected' : ''}>${esc(c.Name)}</option>`).join('')}
      </select>
      <select id="lf-status" onchange="renderLog()">
        <option value="">All Statuses</option>
        <option>Sent</option><option>Failed</option><option>Error</option>
      </select>
      <select id="lf-seq" onchange="renderLog()">
        <option value="">All Sequences</option>
        <option value="1">Seq 1</option><option value="2">Seq 2</option><option value="3">Seq 3</option>
      </select>
      <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="lf-reply" onchange="renderLog()"> Replies only
      </label>
      <span class="filter-count" id="lf-count"></span>
    </div>
    <div class="card" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Time</th><th>Campaign</th><th>Email</th><th>Name</th><th>Seq</th><th>Subject</th><th>Status</th><th style="text-align:center">Replied</th><th>Reply Date</th></tr></thead>
          <tbody id="log-tbody"></tbody>
        </table>
      </div>
    </div>`);
  _logCampaignFilter = '';
  renderLog();
}

function renderLog() {
  const campFilter   = document.getElementById('lf-camp')?.value   || '';
  const statusFilter = document.getElementById('lf-status')?.value || '';
  const seqFilter    = document.getElementById('lf-seq')?.value    || '';
  const replyOnly    = document.getElementById('lf-reply')?.checked;

  let list = _log;
  if (campFilter)   list = list.filter(l => l['Campaign ID'] === campFilter);
  if (statusFilter) list = list.filter(l => l.Status === statusFilter);
  if (seqFilter)    list = list.filter(l => String(l['Sequence #']) === seqFilter);
  if (replyOnly)    list = list.filter(l => l['Reply Detected'] === true || l['Reply Detected'] === 'TRUE');

  document.getElementById('lf-count').textContent = list.length + ' records';
  document.getElementById('log-tbody').innerHTML = list.slice(0, 300).map(l => {
    const replied = l['Reply Detected'] === true || l['Reply Detected'] === 'TRUE';
    return `<tr>
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${fmtDate(l.Timestamp)}</td>
      <td style="white-space:nowrap">${esc(l['Campaign Name'] || '')}</td>
      <td style="color:var(--muted);font-size:12px">${esc(l.Email || '')}</td>
      <td>${esc(l['First Name'] || '')}</td>
      <td style="text-align:center">Seq ${l['Sequence #'] || ''}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${esc(l.Subject || '')}</td>
      <td class="${l.Status === 'Sent' ? 'log-sent' : l.Status === 'Failed' ? 'log-failed' : ''}">${esc(l.Status || '')}</td>
      <td style="text-align:center;color:var(--success);font-size:15px">${replied ? '✓' : ''}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${replied ? fmtDate(l['Reply Date']) : ''}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No records match your filters</td></tr>`;
}

// ── Settings ─────────────────────────────────────────────────
function renderSettings() {
  setContent(`
    <div style="max-width:480px;display:flex;flex-direction:column;gap:14px">
      <div class="card">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:12px">Connection</h3>
        <div class="fg"><label class="fl">Apps Script Web App URL</label><input id="s-url" value="${esc(CFG.url)}"></div>
        <div class="fg"><label class="fl">Secret Token</label><input id="s-token" value="${esc(CFG.token)}"></div>
        <button class="btn btn-primary btn-sm" onclick="saveConn()">Save Connection</button>
      </div>
      <div class="card">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:4px">Sender Config</h3>
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Saved securely in your Apps Script properties, not in this browser.</p>
        <div class="fg"><label class="fl">From Name</label><input id="s-fn" placeholder="Your Name"></div>
        <div class="fg"><label class="fl">From Email</label><input id="s-fe" type="email" placeholder="you@company.com"></div>
        <div class="fg"><label class="fl">Brevo API Key</label><input id="s-bk" type="password" placeholder="xkeysib-…"></div>
        <button class="btn btn-primary btn-sm" onclick="saveSender()">Save to Apps Script</button>
        <span id="sender-msg" style="font-size:12px;color:var(--success);margin-left:8px"></span>
      </div>
      <div class="card">
        <h3 style="font-size:13px;font-weight:600;margin-bottom:6px">Reply Detection</h3>
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Runs automatically at 8 AM ET daily. Click to run it now.</p>
        <button class="btn btn-ghost" onclick="runCheckReplies()">Check Replies Now</button>
        <span id="reply-msg" style="font-size:12px;color:var(--muted);margin-left:8px"></span>
      </div>
    </div>`);
}

function saveConn() {
  saveConfig(document.getElementById('s-url').value.trim(), document.getElementById('s-token').value.trim());
  alert('Connection saved!');
}
async function saveSender() {
  const r = await apiPost('setConfig', {
    fromName:    document.getElementById('s-fn').value.trim(),
    fromEmail:   document.getElementById('s-fe').value.trim(),
    brevoApiKey: document.getElementById('s-bk').value.trim()
  });
  const msg = document.getElementById('sender-msg');
  msg.textContent = r.error ? '✗ ' + r.error : '✓ Saved';
  msg.style.color = r.error ? 'var(--danger)' : 'var(--success)';
}
async function runCheckReplies() {
  const msg = document.getElementById('reply-msg');
  msg.textContent = 'Checking…';
  msg.style.color = 'var(--muted)';
  try {
    const r = await api('checkReplies');
    msg.textContent = r.error ? '✗ ' + r.error : `✓ ${r.updated} contact(s) updated to Connected`;
    msg.style.color = r.error ? 'var(--danger)' : 'var(--success)';
  } catch(e) {
    msg.textContent = '✗ ' + e.message;
    msg.style.color = 'var(--danger)';
  }
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function uniq(arr) { return [...new Set(arr)]; }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtDateInput(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  return dt.toISOString().split('T')[0];
}
function statusBadge(s) {
  const cls = { New: 'b-new', Connected: 'b-connected', Disqualified: 'b-disqualified', Unsubscribed: 'b-unsubscribed' }[s] || 'b-default';
  return `<span class="badge ${cls}">${esc(s || '—')}</span>`;
}
function showModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function onModalBg(e) { if (e.target === document.getElementById('modal')) closeModal(); }

// ── Init ─────────────────────────────────────────────────────
if (!CFG.url) {
  renderSetup();
} else {
  nav('dashboard');
}
</script>
</body>
</html>
